function mult(id) {
  return Math.pow(MULT_POWER, powerLevels[id] || 0);
}

function velPlayer() {
  return VELOCIDADE_PLAYER_BASE * mult("velocidade");
}

function gravidadePlayer() {
  return GRAVIDADE_BASE / mult("leveza");
}

function forcaPulo() {
  return FORCA_PULO_BASE * mult("pulo");
}

function cooldownAtaque() {
  return COOLDOWN_ATAQUE_BASE / mult("cadencia");
}

function danoAtaque() {
  return mult("dano");
}

function vidaMaximaPlayer() {
  return Math.max(1, Math.round(VIDA_PLAYER_BASE * mult("vidaMaxima")));
}

function larguraAtaque() {
  return LARGURA_ATAQUE_BASE * mult("ataqueMaior");
}

function alturaAtaque() {
  return ALTURA_ATAQUE_BASE * mult("ataqueMaior");
}

function duracaoAtaque() {

}

function distanciaAtaque() {

function velocidadeMaximaInimigo() {

function dificuldadeOnda() {
  return 1 + Math.min(ondaAtual * 0.055, 1.35);
}

function ondaDeChefe(numero = ondaAtual) {
  return numero > 0 && numero % 5 === 0;
}

function ondaFinal(numero = ondaAtual) {
  return numero === 50;
}

function ondaRoxa(numero = ondaAtual) {
  return numero === 25;
}

function quantidadeInimigosDaOnda() {
  if (ondaDeChefe(ondaAtual)) return 1;

  const base = 7 + ondaAtual * 3;
  return Math.max(3, Math.round(base / mult("menosMonstros")));
}

function intervaloSpawnOnda() {
  if (ondaDeChefe()) return 250;

  const base = Math.max(330, 1000 - ondaAtual * 35);
  return base * mult("spawnLento");
}

function tamanhoInimigoBase(tipo) {
  const def = TIPOS_INIMIGO[tipo];

  if (def.boss) {
    return def.tamanho;
  }

  const escalaOnda = tipo === "mini" ? 1 : 1 + Math.min(ondaAtual * 0.008, 0.20);
  return Math.max(16, def.tamanho * escalaOnda / mult("monstrosMenores"));
}

function vidaInimigoBase(tipo) {
  const def = TIPOS_INIMIGO[tipo];
  if (tipo === "mini") return 1;

  if (def.boss) {
    const escalaBoss = def.finalBoss ? 1 : def.bossRoxo ? 1 : 1 + ondaAtual * 0.12;
    return Math.max(1, Math.ceil(def.vida * escalaBoss));
  }

  const escalaOnda = 1 + ondaAtual * 0.035;
  return Math.max(1, Math.ceil((def.vida * escalaOnda) / mult("monstrosFrageis")));
}

function escolherTipoInimigo() {
  if (ondaFinal()) {
    return "chefeFinal50";
  }

  if (ondaRoxa()) {
    return "chefeRoxo25";
  }

  if (ondaDeChefe()) {
    return "colosso";
  }

  const disponiveis = Object.keys(TIPOS_INIMIGO)
    .filter(tipo => !["mini", "colosso", "chefeRoxo25", "chefeFinal50"].includes(tipo))
    .filter(tipo => TIPOS_INIMIGO[tipo].desbloqueio <= ondaAtual);

  let soma = 0;
  for (const tipo of disponiveis) {
    soma += TIPOS_INIMIGO[tipo].peso;
  }

  let r = Math.random() * soma;
  for (const tipo of disponiveis) {
    r -= TIPOS_INIMIGO[tipo].peso;
    if (r <= 0) return tipo;
  }

  return "normal";
}

function velocidadeInimigo(tipo) {
  const def = TIPOS_INIMIGO[tipo];
  const variacao = 0.78 + Math.random() * 0.72;
  let v = 130 * def.velocidade * variacao * dificuldadeOnda();

  if (!def.boss) {
    v = v / mult("monstrosLentos");
  } else {
    v = 130 * def.velocidade * (0.95 + Math.random() * 0.25);
  }

  return Math.min(v, velocidadeMaximaInimigo());
}

function criarInimigo(tipo = null, x = null, y = null, direcao = null) {
  if (!tipo) tipo = escolherTipoInimigo();

  const def = TIPOS_INIMIGO[tipo];
  const tamanho = Math.round(tamanhoInimigoBase(tipo));
  const vida = vidaInimigoBase(tipo);

  const lado = Math.random() < 0.5 ? -1 : 1;

  const inimigo = {
    id: proximoIdInimigo++,
    tipo,
    nome: def.nome,
    x: x !== null ? x : (lado === -1 ? -tamanho - 12 : canvas.width + tamanho + 12),
    y: y !== null ? y : (def.voa ? 130 + Math.random() * Math.max(80, CHAO_Y - 330) : CHAO_Y - tamanho),
    largura: tamanho,
    altura: tamanho,
    direcao: direcao !== null ? direcao : (lado === -1 ? 1 : -1),
    velocidade: velocidadeInimigo(tipo),
    vida,
    vidaMaxima: vida,
    pontos: def.pontos,
    velY: 0,
    noChao: true,
    tempoPulo: 0.45 + Math.random() * 1.25,
    tempoInvestida: 1.0 + Math.random() * 1.7,
    tempoTiro: def.boss ? 0.8 : 999,
    tempoTeleporte: def.finalBoss || def.bossRoxo ? 2.8 : 999,
    tempoInvocar: def.boss ? 3.8 : 999,
    tempoSlam: def.boss ? 1.6 : 999,
    investindo: 0,
    piscando: 0
  };

  inimigos.push(inimigo);
}

// =====================================================
// CONTROLES
// =====================================================
const teclas = {
  esquerda: false,
  direita: false,
  baixo: false,
  pulo: false
};

document.addEventListener("keydown", (e) => {
  const k = e.key;

  if (["a","A","d","D","s","S","w","W","ArrowLeft","ArrowRight","ArrowDown","ArrowUp"," "].includes(k)) {
    e.preventDefault();
  }

  if (tela === "titulo" && k === "Enter") {
    abrirEntreOndas();
    return;
  }

  if (tela === "entreOndas" && k === "Enter") {
    iniciarOnda();
    return;
  }

  if ((tela === "gameover" || tela === "vitoria") && k === "Enter") {
    reiniciarTudo();
    return;
  }

  if (tela !== "jogando") return;

  if (k === "a" || k === "A" || k === "ArrowLeft") {
    teclas.esquerda = true;
    player.olhando = -1;
  }

  if (k === "d" || k === "D" || k === "ArrowRight") {
    teclas.direita = true;
    player.olhando = 1;
  }

  if (k === "s" || k === "S" || k === "ArrowDown") {
    teclas.baixo = true;
  }

  if (k === "w" || k === "W" || k === "ArrowUp" || k === " ") {
    teclas.pulo = true;
  }

  if ((k === "j" || k === "J") && !e.repeat) {
    iniciarAtaque();
  }
});

document.addEventListener("keyup", (e) => {
  const k = e.key;

  if (k === "a" || k === "A" || k === "ArrowLeft") teclas.esquerda = false;
  if (k === "d" || k === "D" || k === "ArrowRight") teclas.direita = false;
  if (k === "s" || k === "S" || k === "ArrowDown") teclas.baixo = false;
  if (k === "w" || k === "W" || k === "ArrowUp" || k === " ") teclas.pulo = false;
});

canvas.addEventListener("mousedown", (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);

  for (const b of botoes) {
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      b.acao();
      return;
    }
  }

  if (tela === "jogando") {
    iniciarAtaque();
  }
});

// =====================================================
// FLUXO DE TELAS
// =====================================================
function abrirEntreOndas() {
  tela = "entreOndas";
}

function iniciarOnda() {
  if (tela !== "entreOndas") return;

  tela = "jogando";
  ondaAtual++;
  ondaAtiva = true;
  inimigosParaNascer = quantidadeInimigosDaOnda();
  inimigosTotaisOnda = inimigosParaNascer;
  tempoSpawn = intervaloSpawnOnda();

  ataque.ativo = false;
  contadorCombo = 0;
  tempoResetCombo = 0;
  projeteisChefe = [];
}

function finalizarOnda() {
  ondaAtiva = false;
  projeteisChefe = [];

  if (ondaFinal()) {
    tela = "vitoria";
    return;
  }

  tela = "powerup";
  gerarPowerups();
  curarAoFimDaOnda();
}

function curarAoFimDaOnda() {
  player.vidaMaxima = vidaMaximaPlayer();
  player.vida = Math.min(player.vidaMaxima, player.vida + 1);
}

function gerarPowerups() {
  const disponiveis = POWERUPS.filter(p => powerLevels[p.id] < LIMITE_POWER);
  embaralhar(disponiveis);
  escolhasPowerup = disponiveis.slice(0, Math.min(3, disponiveis.length));
}

function escolherPowerup(id) {
  if (powerLevels[id] >= LIMITE_POWER) return;

  powerLevels[id]++;

  if (id === "vidaMaxima") {
    player.vidaMaxima = vidaMaximaPlayer();
    player.vida = player.vidaMaxima;
  }

  tela = "entreOndas";
}

function reiniciarTudo() {
  tela = "titulo";
  pontos = 0;
  mortes = 0;
  ondaAtual = 0;
  ondaAtiva = false;
  inimigosParaNascer = 0;
  inimigosTotaisOnda = 0;
  tempoSpawn = 0;
  inimigos = [];
  projeteisChefe = [];
  particulas = [];
  proximoIdInimigo = 1;
  ataque.ativo = false;
  contadorCombo = 0;
  tempoResetCombo = 0;
  shakeTela = 0;

  for (const id in powerLevels) {
    powerLevels[id] = 0;
  }

  player.x = 140;
  player.y = CHAO_Y - player.altura;
  player.velY = 0;
  player.noChao = true;
  player.olhando = 1;
  player.cooldownAtaque = 0;
  player.invulneravel = 0;
  player.vidaMaxima = VIDA_PLAYER_BASE;
  player.vida = player.vidaMaxima;

  teclas.esquerda = false;
  teclas.direita = false;
  teclas.baixo = false;
  teclas.pulo = false;
}

// =====================================================
// ATAQUE
// =====================================================
function iniciarAtaque() {
  if (player.cooldownAtaque > 0) return;

  if (tempoResetCombo <= 0) {
    contadorCombo = 0;
  }

  contadorCombo++;

  let especial = false;
  if (contadorCombo >= 3) {
    especial = true;
    contadorCombo = 0;
  }

  tempoResetCombo = TEMPO_COMBO;

  const multEspecial = especial ? MULT_COMBO : 1;
  const golpeParaBaixo = teclas.baixo;

  ataque.ativo = true;
  ataque.especial = especial;
  ataque.tempo = duracaoAtaque() * multEspecial;
  ataque.direcao = player.olhando;
  ataque.vertical = golpeParaBaixo ? 1 : 0;

  if (golpeParaBaixo) {
    ataque.largura = alturaAtaque() * multEspecial;
    ataque.altura = larguraAtaque() * 1.25 * multEspecial;
  } else {
    ataque.largura = larguraAtaque() * multEspecial;
    ataque.altura = alturaAtaque() * multEspecial;
  }

  ataque.dano = danoAtaque() * (especial ? 1.15 : 1);
  ataque.atingidos = new Set();

  posicionarAtaque();

  player.cooldownAtaque = cooldownAtaque();
}

function posicionarAtaque() {
  if (!ataque.ativo) return;

  const dist = distanciaAtaque();

  if (ataque.vertical === 1) {
    ataque.x = player.x + player.largura / 2 - ataque.largura / 2;
    ataque.y = player.y + player.altura + dist * 0.45;

    if (ataque.y + ataque.altura > CHAO_Y) {
      ataque.y = CHAO_Y - ataque.altura;
    }

    return;
  }

  if (ataque.direcao === 1) {
    ataque.x = player.x + player.largura + dist;
  } else {
    ataque.x = player.x - ataque.largura - dist;
  }

  ataque.y = player.y + player.altura / 2 - ataque.altura / 2;
}

function atualizarAtaque(dt) {
  if (!ataque.ativo) return;

  ataque.tempo -= dt;
  posicionarAtaque();

  if (ataque.tempo <= 0) {
    ataque.ativo = false;
  }
}

// =====================================================
// ATUALIZAÇÃO
// =====================================================
function atualizar(dt) {
  tempoTotal += dt;

  if (shakeTela > 0) {
    shakeTela -= dt;
  }

  atualizarParticulas(dt);

  if (tela !== "jogando") return;

  atualizarPlayer(dt);
  atualizarAtaque(dt);
  atualizarSpawn(dt);
  atualizarInimigos(dt);
  atualizarProjeteisChefe(dt);

  if (ondaAtiva && inimigosParaNascer <= 0 && inimigos.length === 0) {
    finalizarOnda();
  }
}

function atualizarPlayer(dt) {
  if (teclas.esquerda) {
    player.x -= velPlayer() * dt;
    player.olhando = -1;
  }

  if (teclas.direita) {
    player.x += velPlayer() * dt;
    player.olhando = 1;
  }

  if (teclas.pulo && player.noChao) {
    player.velY = -forcaPulo();
    player.noChao = false;
  }

  player.velY += gravidadePlayer() * dt;
  player.y += player.velY * dt;

  if (player.y + player.altura >= CHAO_Y) {
    player.y = CHAO_Y - player.altura;
    player.velY = 0;
    player.noChao = true;
  }

  player.x = clamp(player.x, 0, canvas.width - player.largura);

  if (player.cooldownAtaque > 0) {
    player.cooldownAtaque -= dt;
  }

  if (player.invulneravel > 0) {
    player.invulneravel -= dt;
  }

  if (tempoResetCombo > 0) {
    tempoResetCombo -= dt;
    if (tempoResetCombo <= 0) {
      contadorCombo = 0;
    }
  }
}

function atualizarSpawn(dt) {
  if (!ondaAtiva) return;
  if (inimigosParaNascer <= 0) return;

  tempoSpawn += dt * 1000;

  const intervalo = intervaloSpawnOnda();

  while (tempoSpawn >= intervalo && inimigosParaNascer > 0) {
    criarInimigo();
    inimigosParaNascer--;
    tempoSpawn -= intervalo;
  }
}

function atualizarInimigos(dt) {
  for (let i = inimigos.length - 1; i >= 0; i--) {
    const e = inimigos[i];

    atualizarIAInimigo(e, dt);

    if (
      ataque.ativo &&
      colidiu(ataque, e) &&
      !ataque.atingidos.has(e.id)
    ) {
      ataque.atingidos.add(e.id);
      atingirInimigo(e, i);
      continue;
    }

    if (player.invulneravel <= 0 && colidiu(player, e)) {
      machucarPlayer(e);
    }

    if (e.y > canvas.height + 200 || e.x < -260 || e.x > canvas.width + 260) {
      inimigos.splice(i, 1);
    }
  }
}

function atualizarIAInimigo(e, dt) {
  const def = TIPOS_INIMIGO[e.tipo];

  e.piscando = Math.max(0, e.piscando - dt);

  if (def.boss) {
    atualizarChefe(e, dt);
    return;
  }

  if (def.voa) {
    atualizarInimigoVoador(e, dt);
    return;
  }

  if (Math.abs((player.x + player.largura / 2) - (e.x + e.largura / 2)) > 12) {
    e.direcao = player.x > e.x ? 1 : -1;
  }

  let v = e.velocidade;

  if (def.investe) {
    e.tempoInvestida -= dt;

    if (e.tempoInvestida <= 0 && e.noChao) {
      e.investindo = 0.45;
      e.tempoInvestida = 1.4 + Math.random() * 1.8;
      criarParticulas(e.x + e.largura / 2, e.y + e.altura, 10, "#5fffd0");
    }

    if (e.investindo > 0) {
      e.investindo -= dt;
      v = Math.min(v * 2.4, velocidadeMaximaInimigo());
    }
  }

  e.x += e.direcao * v * dt;

  if (def.pula) {
    e.tempoPulo -= dt;

    if (e.noChao && e.tempoPulo <= 0) {
      const forca = def.saltoPesado ? 560 : 470;
      e.velY = -forca - Math.random() * 110;
      e.noChao = false;
      e.tempoPulo = def.saltoPesado ? 1.1 + Math.random() * 1.4 : 0.7 + Math.random() * 1.2;
    }
  }

  e.velY += GRAVIDADE_BASE * dt;
  e.y += e.velY * dt;

  if (e.y + e.altura >= CHAO_Y) {
    e.y = CHAO_Y - e.altura;
    e.velY = 0;
    e.noChao = true;
  }
}

function atualizarInimigoVoador(e, dt) {
  const def = TIPOS_INIMIGO[e.tipo];
  const alvoX = player.x + player.largura / 2 - e.largura / 2;
  const alvoY = player.y + player.altura / 2 - e.altura / 2;

  e.direcao = alvoX > e.x ? 1 : -1;

  let v = e.velocidade;

  if (def.investe) {
    e.tempoInvestida -= dt;

    if (e.tempoInvestida <= 0) {
      e.investindo = 0.55;
      e.tempoInvestida = 1.3 + Math.random() * 1.4;
      criarParticulas(e.x + e.largura / 2, e.y + e.altura / 2, 8, "#b5ff5c");
    }

    if (e.investindo > 0) {
      e.investindo -= dt;
      v = Math.min(v * 2.2, velocidadeMaximaInimigo());
    }
  }

  e.x += Math.sign(alvoX - e.x) * v * dt;
  e.y += Math.sign(alvoY - e.y) * v * 0.55 * dt;
  e.y += Math.sin(tempoTotal * 5 + e.id) * 22 * dt;

  e.y = clamp(e.y, 70, CHAO_Y - e.altura - 70);
}

function atualizarChefe(e, dt) {
  const def = TIPOS_INIMIGO[e.tipo];

  if (def.finalBoss) {
    atualizarChefeFinal50(e, dt);
    return;
  }

  if (def.bossRoxo) {
    atualizarChefeRoxo25(e, dt);
    return;
  }

  atualizarChefeColosso(e, dt);
}

function atualizarChefeColosso(e, dt) {
  const centroPlayer = player.x + player.largura / 2;
  const centroChefe = e.x + e.largura / 2;
  e.direcao = centroPlayer > centroChefe ? 1 : -1;

  e.x += e.direcao * e.velocidade * dt;
  e.x = clamp(e.x, 40, canvas.width - e.largura - 40);

  e.tempoPulo -= dt;
  e.tempoTiro -= dt;
  e.tempoInvocar -= dt;
  e.tempoSlam -= dt;

  if (e.noChao && e.tempoPulo <= 0) {
    e.velY = -610;
    e.noChao = false;
    e.tempoPulo = 1.7 + Math.random() * 1.2;
  }

  if (e.tempoTiro <= 0) {
    criarOndaDeChoque(e.x + e.largura / 2, "#9eff61", 1);
    e.tempoTiro = Math.max(1.0, 2.0 - ondaAtual * 0.025);
  }

  if (e.tempoInvocar <= 0 && ondaAtual >= 10) {
    criarInimigo(Math.random() < 0.5 ? "voador" : "rapido", e.x + e.largura / 2, null, e.direcao);
    e.tempoInvocar = 4.6;
  }

  e.velY += GRAVIDADE_BASE * dt;
  e.y += e.velY * dt;

  if (e.y + e.altura >= CHAO_Y) {
    if (!e.noChao && e.velY > 260) {
      criarOndaDeChoque(e.x + e.largura / 2, "#d3ff61", 1);
      shakeTela = 0.13;
    }

    e.y = CHAO_Y - e.altura;
    e.velY = 0;
    e.noChao = true;
  }
}

function atualizarChefeRoxo25(e, dt) {
  // O antigo chefe final agora aparece na onda 25: teleporta, atira e invoca voadores.
  const centroPlayer = player.x + player.largura / 2;
  const alvoX = clamp(centroPlayer - e.largura / 2, 90, canvas.width - e.largura - 90);

  e.direcao = centroPlayer > e.x + e.largura / 2 ? 1 : -1;
  e.x += (alvoX - e.x) * 0.55 * dt;

  const baseY = CHAO_Y - e.altura - 45;
  e.y = baseY + Math.sin(tempoTotal * 2.7) * 34;

  e.tempoTiro -= dt;
  e.tempoTeleporte -= dt;
  e.tempoInvocar -= dt;

  if (e.tempoTiro <= 0) {
    dispararChefeRoxo(e);
    e.tempoTiro = 0.72;
  }

  if (e.tempoTeleporte <= 0) {
    e.x = Math.random() < 0.5 ? 110 : canvas.width - e.largura - 110;
    criarParticulas(e.x + e.largura / 2, e.y + e.altura / 2, 28, "#c77dff");
    shakeTela = 0.10;
    e.tempoTeleporte = 2.4 + Math.random() * 0.8;
  }

  if (e.tempoInvocar <= 0) {
    criarInimigo("voador", e.x + e.largura / 2, 130 + Math.random() * 180, -1);
    criarInimigo("voador", e.x + e.largura / 2, 130 + Math.random() * 180, 1);
    criarParticulas(e.x + e.largura / 2, e.y + e.altura / 2, 18, "#b35cff");
    e.tempoInvocar = 4.1;
  }
}

function atualizarChefeFinal50(e, dt) {
  // Chefe final da onda 50: mais agressivo, padrões misturados, arena cheia de projéteis.
  const centroPlayer = player.x + player.largura / 2;
  const centroChefe = e.x + e.largura / 2;

  e.direcao = centroPlayer > centroChefe ? 1 : -1;

  const alvoX = clamp(centroPlayer - e.largura / 2, 70, canvas.width - e.largura - 70);
  e.x += (alvoX - e.x) * 0.82 * dt;

  const baseY = CHAO_Y - e.altura - 70;
  e.y = baseY + Math.sin(tempoTotal * 4.2) * 54;

  e.tempoTiro -= dt;
  e.tempoTeleporte -= dt;
  e.tempoInvocar -= dt;
  e.tempoSlam -= dt;

  if (e.tempoTiro <= 0) {
    dispararChefeFinal50(e);
    e.tempoTiro = 0.48;
  }

  if (e.tempoTeleporte <= 0) {
    e.x = Math.random() < 0.5 ? 70 : canvas.width - e.largura - 70;
    e.y = 120 + Math.random() * 170;
    criarParticulas(e.x + e.largura / 2, e.y + e.altura / 2, 42, "#ff4dff");
    shakeTela = 0.16;
    e.tempoTeleporte = 1.8 + Math.random() * 0.8;
  }

  if (e.tempoInvocar <= 0) {
    criarInimigo("voadorRapido", e.x + e.largura / 2, 120 + Math.random() * 230, -1);
    criarInimigo("voadorRapido", e.x + e.largura / 2, 120 + Math.random() * 230, 1);
    criarInimigo("mini", e.x + e.largura / 2, CHAO_Y - 24, Math.random() < 0.5 ? -1 : 1);
    criarParticulas(e.x + e.largura / 2, e.y + e.altura / 2, 24, "#ff4dff");
    e.tempoInvocar = 3.6;
  }

  if (e.tempoSlam <= 0) {
    criarOndaDeChoque(e.x + e.largura / 2, "#ff4dff", 2);
    e.tempoSlam = 2.5;
  }
}

function dispararChefeRoxo(e) {
  const padrao = Math.floor(Math.random() * 3);
  const cx = e.x + e.largura / 2;
  const cy = e.y + e.altura / 2;

  if (padrao === 0) {
    for (let i = -1; i <= 1; i++) {
      criarProjetilChefe(cx, cy, player.x + player.largura / 2 + i * 70, player.y + player.altura / 2, 270, 15, "#c77dff", 1);
    }
  } else if (padrao === 1) {
    criarLequeProjetil(cx, cy, 5, 245, "#c77dff", 1);
  } else {
    criarChuvaProjetil(7, "#d9a5ff", 1);
  }

  criarParticulas(cx, cy, 12, "#d9a5ff");
}

function dispararChefeFinal50(e) {
  const padrao = Math.floor(Math.random() * 5);
  const cx = e.x + e.largura / 2;
  const cy = e.y + e.altura / 2;

  if (padrao === 0) {
    for (let i = -2; i <= 2; i++) {
      criarProjetilChefe(cx, cy, player.x + player.largura / 2 + i * 55, player.y + player.altura / 2, 330, 16, "#ff4dff", 1);
    }
  } else if (padrao === 1) {
    criarLequeProjetil(cx, cy, 9, 285, "#ff74ff", 1);
  } else if (padrao === 2) {
    criarChuvaProjetil(12, "#e6a2ff", 1);
  } else if (padrao === 3) {
    criarOndaDeChoque(cx, "#ff4dff", 2);
  } else {
    for (let i = 0; i < 4; i++) {
      criarProjetilChefe(cx, cy, 100 + i * 300, CHAO_Y - 60, 260, 22, "#9b36ff", 2);
    }
  }

  criarParticulas(cx, cy, 16, "#ff8cff");
}

function criarLequeProjetil(cx, cy, quantidade, velocidade, cor, dano) {
  const inicio = -Math.PI * 0.82;
  const fim = -Math.PI * 0.18;

  for (let i = 0; i < quantidade; i++) {
    const t = quantidade === 1 ? 0.5 : i / (quantidade - 1);
    const ang = inicio + (fim - inicio) * t;
    projeteisChefe.push({
      x: cx,
      y: cy,
      largura: 16,
      altura: 16,
      velX: Math.cos(ang) * velocidade,
      velY: Math.sin(ang) * velocidade,
      vida: 4.0,
      cor,
      dano
    });
  }
}

function criarChuvaProjetil(qtd, cor, dano) {
  for (let i = 0; i < qtd; i++) {
    projeteisChefe.push({
      x: 70 + Math.random() * (canvas.width - 140),
      y: -20 - Math.random() * 180,
      largura: 18,
      altura: 18,
      velX: (Math.random() - 0.5) * 70,
      velY: 260 + Math.random() * 150,
      vida: 4.8,
      cor,
      dano
    });
  }
}

function criarOndaDeChoque(x, cor, dano) {
  projeteisChefe.push({
    x: x - 12,
    y: CHAO_Y - 28,
    largura: 28,
    altura: 22,
    velX: -300,
    velY: 0,
    vida: 2.4,
    cor,
    dano
  });

  projeteisChefe.push({
    x: x - 12,
    y: CHAO_Y - 28,
    largura: 28,
    altura: 22,
    velX: 300,
    velY: 0,
    vida: 2.4,
    cor,
    dano
  });
}

function criarProjetilChefe(x, y, alvoX, alvoY, velocidade, tamanho, cor = "#c77dff", dano = 1) {
  const dx = alvoX - x;
  const dy = alvoY - y;
  const dist = Math.max(1, Math.hypot(dx, dy));

  projeteisChefe.push({
    x,
    y,
    largura: tamanho,
    altura: tamanho,
    velX: dx / dist * velocidade,
    velY: dy / dist * velocidade,
    vida: 4.0,
    cor,
    dano
  });
}

function atualizarProjeteisChefe(dt) {
  for (let i = projeteisChefe.length - 1; i >= 0; i--) {
    const p = projeteisChefe[i];

    p.x += p.velX * dt;
    p.y += p.velY * dt;
    p.vida -= dt;

    if (player.invulneravel <= 0 && colidiu(player, p)) {
      player.vida -= p.dano || 1;
      player.invulneravel = 0.85;
      player.velY = -280;
      shakeTela = 0.14;
      criarParticulas(player.x + player.largura / 2, player.y + player.altura / 2, 16, p.cor || "#ff4dff");
      projeteisChefe.splice(i, 1);

      if (player.vida <= 0) {
        tela = "gameover";
        ondaAtiva = false;
      }

      continue;
    }

    if (p.vida <= 0 || p.x < -100 || p.x > canvas.width + 100 || p.y < -160 || p.y > canvas.height + 160) {
      projeteisChefe.splice(i, 1);
    }
  }
}

function atingirInimigo(e, indice) {
  const def = TIPOS_INIMIGO[e.tipo];

  let dano = ataque.dano;

  if (def.boss) {
    dano = ataque.especial ? 1.15 : 1;
  }

  if (def.blindado) {
    dano = Math.min(dano, 1.1);
  }

  e.vida -= dano;
  e.piscando = 0.08;

  criarParticulas(
    e.x + e.largura / 2,
    e.y + e.altura / 2,
    ataque.especial ? 16 : 8,
    "#78ff73"
  );

  if (ataque.vertical === 1) {
    aplicarPogo();
  }

  if (e.vida <= 0) {
    destruirInimigo(e, indice);
  }
}


function aplicarPogo() {
  player.velY = -Math.max(IMPULSO_POGO, forcaPulo() * 0.72);
  player.noChao = false;
  player.invulneravel = Math.max(player.invulneravel, 0.10);
  criarParticulas(player.x + player.largura / 2, player.y + player.altura + 4, 10, "#35d9ff");
}

function destruirInimigo(e, indice) {
  pontos += e.pontos;
  mortes++;

  criarExplosao(e.x + e.largura / 2, e.y + e.altura / 2, e.tipo);

  if (TIPOS_INIMIGO[e.tipo].finalBoss) {
    inimigos.splice(indice, 1);
    inimigos = [];
    projeteisChefe = [];
    finalizarOnda();
    return;
  }

  if (TIPOS_INIMIGO[e.tipo].divide) {
    criarInimigo("mini", e.x + 8, e.y + e.altura - 24, -1);
    criarInimigo("mini", e.x + e.largura - 24, e.y + e.altura - 24, 1);
  }

  inimigos.splice(indice, 1);
}

function machucarPlayer(e) {
  player.vida -= TIPOS_INIMIGO[e.tipo].boss ? 2 : 1;
  player.invulneravel = 0.85;
  player.velY = -330;
  player.x += e.direcao * 28;
  shakeTela = 0.18;

  criarParticulas(player.x + player.largura / 2, player.y + player.altura / 2, 18, "#ff4d4d");

  if (player.vida <= 0) {
    tela = "gameover";
    ondaAtiva = false;
  }
}

// =====================================================
// PARTICULAS
// =====================================================
function criarExplosao(x, y, tipo = "normal") {
  const def = TIPOS_INIMIGO[tipo] || TIPOS_INIMIGO.normal;
  let qtd = def.boss ? 42 : (tipo.includes("gigante") || tipo === "gigante" ? 32 : 18);

  criarParticulas(x, y, qtd, def.cor);

  if (particulas.length > MAX_PARTICULAS) {
    particulas.splice(0, particulas.length - MAX_PARTICULAS);
  }
}

function criarParticulas(x, y, qtd, cor) {
  for (let i = 0; i < qtd; i++) {
    const ang = Math.random() * Math.PI * 2;
    const v = 80 + Math.random() * 330;
    const tam = 3 + Math.random() * 8;

    particulas.push({
      x,
      y,
      largura: tam,
      altura: tam,
      velX: Math.cos(ang) * v,
      velY: Math.sin(ang) * v - 70,
      vida: 0.28 + Math.random() * 0.55,
      vidaMax: 0.9,
      cor
    });
  }

  if (particulas.length > MAX_PARTICULAS) {
    particulas.splice(0, particulas.length - MAX_PARTICULAS);
  }
}

function atualizarParticulas(dt) {
  for (let i = particulas.length - 1; i >= 0; i--) {
    const p = particulas[i];

    p.x += p.velX * dt;
    p.y += p.velY * dt;
    p.velY += 520 * dt;
    p.vida -= dt;

    if (p.vida <= 0 || p.y + p.altura > CHAO_Y - 4) {
      particulas.splice(i, 1);
    }
  }
}

// =====================================================
// DESENHO
// =====================================================
function desenhar() {
  botoes = [];

  ctx.save();

  if (shakeTela > 0) {
    ctx.translate((Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8);
  }

  desenharFundo();

  if (tela !== "titulo" && tela !== "ajuda") {
    desenharMundo();
    desenharHUD();
  }

  if (tela === "titulo") desenharTitulo();
  if (tela === "ajuda") desenharAjuda();
  if (tela === "entreOndas") desenharTelaEntreOndas();
  if (tela === "powerup") desenharTelaPowerup();
  if (tela === "gameover") desenharGameOver();
  if (tela === "vitoria") desenharVitoria();

  ctx.restore();
}

function desenharFundo() {
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, "#101427");
  grad.addColorStop(0.55, "#070a12");
  grad.addColorStop(1, "#030407");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = "#6b7cff";
  ctx.lineWidth = 1;

  const offset = (tempoTotal * 24) % 60;
  for (let x = -60 + offset; x < canvas.width + 60; x += 60) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x - 180, canvas.height);
    ctx.stroke();
  }

  for (let y = 30; y < canvas.height; y += 60) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  ctx.restore();

  const radial = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 100, canvas.width/2, canvas.height/2, 780);
  radial.addColorStop(0, "rgba(255,255,255,0.02)");
  radial.addColorStop(1, "rgba(0,0,0,0.62)");
  ctx.fillStyle = radial;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function desenharMundo() {
  // Chão encostado no fundo da tela
  ctx.fillStyle = "rgba(255,255,255,0.95)";
  arredondarRetangulo(0, CHAO_Y, canvas.width, ALTURA_CHAO, 0, true, false);

  ctx.fillStyle = "rgba(255,255,255,0.12)";
  for (let x = 0; x < canvas.width; x += 42) {
    ctx.fillRect(x, CHAO_Y + 6, 22, 4);
  }

  if (ataque.ativo) {
    ctx.save();
    ctx.globalAlpha = ataque.especial ? 0.95 : 0.80;
    ctx.shadowColor = ataque.especial ? "#31e7ff" : "#145cff";
    ctx.shadowBlur = ataque.especial ? 24 : 14;
    ctx.fillStyle = ataque.especial ? "#28d8ff" : "#185cff";
    arredondarRetangulo(ataque.x, ataque.y, ataque.largura, ataque.altura, 10, true, false);

    ctx.globalAlpha = 0.35;
    ctx.fillStyle = "white";
    if (ataque.vertical === 1) {
      arredondarRetangulo(ataque.x + 4, ataque.y + 4, Math.max(4, ataque.largura * 0.25), ataque.altura - 8, 6, true, false);
    } else {
      arredondarRetangulo(ataque.x + 4, ataque.y + 4, ataque.largura - 8, Math.max(4, ataque.altura * 0.25), 6, true, false);
    }
    ctx.restore();
  }

  desenharPlayer();

  for (const e of inimigos) {
    desenharInimigo(e);
  }

  for (const p of projeteisChefe) {
    ctx.save();
    ctx.shadowColor = p.cor;
    ctx.shadowBlur = 16;
    ctx.fillStyle = p.cor;
    arredondarRetangulo(p.x, p.y, p.largura, p.altura, 7, true, false);
    ctx.restore();
  }

  for (const p of particulas) {
    const a = clamp(p.vida / p.vidaMax, 0, 1);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = p.cor;
    arredondarRetangulo(p.x, p.y, p.largura, p.altura, 2, true, false);
    ctx.restore();
  }
}

function desenharPlayer() {
  ctx.save();

  if (player.invulneravel > 0) {
    ctx.globalAlpha = 0.55 + Math.sin(tempoTotal * 40) * 0.25;
  }

  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.beginPath();
  ctx.ellipse(player.x + player.largura / 2, CHAO_Y + 8, player.largura * 0.55, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  const grad = ctx.createLinearGradient(player.x, player.y, player.x, player.y + player.altura);
  grad.addColorStop(0, "#ff6b6b");
  grad.addColorStop(1, "#bd1212");

  ctx.shadowColor = "#ff2d2d";
  ctx.shadowBlur = player.invulneravel > 0 ? 22 : 8;
  ctx.fillStyle = grad;
  arredondarRetangulo(player.x, player.y, player.largura, player.altura, 10, true, false);

  ctx.shadowBlur = 0;
  ctx.lineWidth = 3;
  ctx.strokeStyle = "#ffd1d1";
  arredondarRetangulo(player.x, player.y, player.largura, player.altura, 10, false, true);

  // Olhos inteiramente pretos
  ctx.fillStyle = "#050505";
  const olhoY = player.y + 14;
  const olhoX1 = player.x + (player.olhando === 1 ? 27 : 12);
  const olhoX2 = player.x + (player.olhando === 1 ? 37 : 22);
  ctx.fillRect(olhoX1, olhoY, 7, 9);
  ctx.fillRect(olhoX2, olhoY, 7, 9);

  ctx.fillStyle = "rgba(255,255,255,0.18)";
  ctx.fillRect(player.x + 7, player.y + 8, 7, player.altura - 16);

  ctx.restore();
}

function desenharInimigo(e) {
  const def = TIPOS_INIMIGO[e.tipo];

  ctx.save();

  ctx.fillStyle = "rgba(0,0,0,0.42)";
  ctx.beginPath();
  ctx.ellipse(e.x + e.largura / 2, CHAO_Y + 8, e.largura * 0.52, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  if (e.piscando > 0) {
    ctx.globalAlpha = 0.65;
  }

  const grad = ctx.createLinearGradient(e.x, e.y, e.x, e.y + e.altura);
  grad.addColorStop(0, def.cor);
  grad.addColorStop(1, def.cor2);

  ctx.shadowColor = def.cor;
  ctx.shadowBlur = def.boss ? 18 : 8;
  ctx.fillStyle = grad;
  arredondarRetangulo(e.x, e.y, e.largura, e.altura, def.boss ? 14 : 8, true, false);

  ctx.shadowBlur = 0;
  ctx.lineWidth = def.boss ? 4 : 2;
  ctx.strokeStyle = def.blindado ? "#eaffea" : "rgba(255,255,255,0.58)";
  arredondarRetangulo(e.x, e.y, e.largura, e.altura, def.boss ? 14 : 8, false, true);

  ctx.fillStyle = "#081008";
  const olhoY = e.y + Math.max(8, e.altura * 0.24);
  const ox = e.direcao === 1 ? e.x + e.largura * 0.56 : e.x + e.largura * 0.28;
  ctx.fillRect(ox, olhoY, Math.max(4, e.largura * 0.09), Math.max(5, e.altura * 0.12));
  ctx.fillRect(ox + e.largura * 0.18, olhoY, Math.max(4, e.largura * 0.09), Math.max(5, e.altura * 0.12));

  if (def.voa) {
    ctx.fillStyle = "rgba(255,255,255,0.72)";
    ctx.beginPath();
    ctx.ellipse(e.x + 4, e.y + e.altura * 0.45, 12, 7, -0.4, 0, Math.PI * 2);
    ctx.ellipse(e.x + e.largura - 4, e.y + e.altura * 0.45, 12, 7, 0.4, 0, Math.PI * 2);
    ctx.fill();
  }

  if (def.pula) {
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.beginPath();
    ctx.moveTo(e.x + e.largura * 0.5, e.y + 7);
    ctx.lineTo(e.x + e.largura * 0.62, e.y + 18);
    ctx.lineTo(e.x + e.largura * 0.38, e.y + 18);
    ctx.closePath();
    ctx.fill();
  }

  if (def.blindado) {
    ctx.strokeStyle = "white";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(e.x + 8, e.y + e.altura * 0.55);
    ctx.lineTo(e.x + e.largura - 8, e.y + e.altura * 0.55);
    ctx.stroke();
  }

  if (def.investe) {
    ctx.fillStyle = e.investindo > 0 ? "#fff27a" : "rgba(255,255,255,0.75)";
    ctx.fillRect(e.x + e.largura * 0.2, e.y + e.altura - 12, e.largura * 0.6, 5);
  }

  if (def.divide) {
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(e.x + e.largura / 2 - 2, e.y + 6, 4, e.altura - 12);
  }

  if (e.vidaMaxima > 1) {
    const bw = e.largura;
    const bh = def.boss ? 8 : 5;
    const bx = e.x;
    const by = e.y - (def.boss ? 15 : 10);

    ctx.fillStyle = "rgba(0,0,0,0.65)";
    arredondarRetangulo(bx, by, bw, bh, 3, true, false);

    ctx.fillStyle = def.boss ? "#ffea61" : "#ffffff";
    const pct = clamp(e.vida / e.vidaMaxima, 0, 1);
    arredondarRetangulo(bx, by, bw * pct, bh, 3, true, false);
  }

  if (def.boss) {
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.font = "bold 12px Arial";
    ctx.textAlign = "center";
    ctx.fillText(def.finalBoss ? "CORAÇÃO DO ABISMO" : def.bossRoxo ? "NÚCLEO ROXO" : "COLOSSO", e.x + e.largura / 2, e.y - 20);
    ctx.textAlign = "left";
  }

  ctx.restore();
}

function desenharBotao(x, y, w, h, texto, acao, destaque = false) {
  botoes.push({x, y, w, h, acao});

  ctx.save();

  const grad = ctx.createLinearGradient(x, y, x, y + h);
  if (destaque) {
    grad.addColorStop(0, "#35d9ff");
    grad.addColorStop(1, "#1767ff");
  } else {
    grad.addColorStop(0, "#353b4d");
    grad.addColorStop(1, "#171b29");
  }

  ctx.fillStyle = grad;
  arredondarRetangulo(x, y, w, h, 14, true, false);

  ctx.strokeStyle = destaque ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.35)";
  ctx.lineWidth = 2;
  arredondarRetangulo(x, y, w, h, 14, false, true);

  ctx.fillStyle = "white";
  ctx.font = "bold 18px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(texto, x + w / 2, y + h / 2);

  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
  ctx.restore();
}

// =====================================================
// UTILIDADES DE DESENHO
// =====================================================
function arredondarRetangulo(x, y, w, h, r, fill, stroke) {
  r = Math.min(r, w / 2, h / 2);

  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();

  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

function desenharCoracao(x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y + s * 0.35);
  ctx.bezierCurveTo(x, y, x - s * 0.55, y, x - s * 0.55, y + s * 0.35);
  ctx.bezierCurveTo(x - s * 0.55, y + s * 0.7, x, y + s, x, y + s * 1.18);
  ctx.bezierCurveTo(x, y + s, x + s * 0.55, y + s * 0.7, x + s * 0.55, y + s * 0.35);
  ctx.bezierCurveTo(x + s * 0.55, y, x, y, x, y + s * 0.35);
  ctx.fill();
}

function quebrarTexto(texto, x, y, maxWidth, lineHeight) {
  const palavras = texto.split(" ");
  let linha = "";

  for (let n = 0; n < palavras.length; n++) {
    const teste = linha + palavras[n] + " ";
    const largura = ctx.measureText(teste).width;

    if (largura > maxWidth && n > 0) {
      ctx.fillText(linha, x + maxWidth / 2, y);
      linha = palavras[n] + " ";
      y += lineHeight;
    } else {
      linha = teste;
    }
  }

  ctx.fillText(linha, x + maxWidth / 2, y);
}

function colidiu(a, b) {
  return (
    a.x < b.x + b.largura &&
    a.x + a.largura > b.x &&
    a.y < b.y + b.altura &&
    a.y + a.altura > b.y
  );
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function embaralhar(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// =====================================================
// LOOP
// =====================================================
function loop(t) {
  const dt = Math.min((t - ultimoTempo) / 1000, 0.033);
  ultimoTempo = t;

  atualizar(dt);
  desenhar();

  requestAnimationFrame(loop);
}

reiniciarTudo();
requestAnimationFrame(loop);
</script>
